<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IATA — Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2L25 8.5V21.5L14 28L3 21.5V8.5L14 2Z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M14 8L20 11.5V18.5L14 22L8 18.5V11.5L14 8Z" fill="currentColor" opacity="0.15"/>
            <circle cx="14" cy="14" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">IATA</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
    </div>

    <div class="sidebar-section">
      <p class="section-label">Suggested</p>
      <div class="suggestions">
        <button class="suggestion" onclick="useSuggestion(this)">Latest papers on RAG pipelines</button>
        <button class="suggestion" onclick="useSuggestion(this)">Trends in LLM fine-tuning 2024</button>
        <button class="suggestion" onclick="useSuggestion(this)">Summarize papers on mixture of experts</button>
        <button class="suggestion" onclick="useSuggestion(this)">Recent advances in vector search</button>
        <button class="suggestion" onclick="useSuggestion(this)">Papers on multimodal models 2024</button>
      </div>
    </div>

    <div class="sidebar-section">
      <p class="section-label">Stack</p>
      <div class="stack-pills">
        <span class="stack-pill purple">LangGraph</span>
        <span class="stack-pill teal">arXiv</span>
        <span class="stack-pill amber">pgvector</span>
        <span class="stack-pill blue">Azure OpenAI</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <a href="https://github.com" target="_blank" class="gh-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
      <span class="version">v0.1.0</span>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-stack">
        <span class="stack-dot"></span>
        <span class="stack-label">GPT-4.1 nano · LangGraph · Supabase</span>
      </div>
      <span class="thread-badge" id="thread-badge">—</span>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 4L50 17V39L28 52L6 39V17L28 4Z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M28 14L40 21V35L28 42L16 35V21L28 14Z" fill="currentColor" opacity="0.1"/>
            <circle cx="28" cy="28" r="4" fill="currentColor" opacity="0.8"/>
            <circle cx="28" cy="28" r="7" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
          </svg>
        </div>
        <h1 class="welcome-title">Research Agent</h1>
        <p class="welcome-sub">Find, compare and understand scientific papers with a multi-agent AI system.</p>
        <div class="welcome-chips">
          <button class="chip" onclick="useSuggestion(this)">Efficient transformers</button>
          <button class="chip" onclick="useSuggestion(this)">Trends in RLHF</button>
          <button class="chip" onclick="useSuggestion(this)">State space models</button>
        </div>
      </div>
    </div>

    <div class="agent-status" id="agent-status" style="display:none">
      <div class="status-dots">
        <span></span><span></span><span></span>
      </div>
      <span id="status-text">Thinking…</span>
    </div>

    <div class="input-area">
      <div class="input-box" id="input-box">
        <textarea
          id="msg-input"
          class="msg-input"
          placeholder="Ask about papers, trends, summaries…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">arXiv · Supabase memory — conversations saved across sessions</p>
    </div>
  </main>


  <script src="../static/js/chat.js"></script>
</body>
</html>
